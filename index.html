<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Queen ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#000;
    color:white;
}

.intro{
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#4b003f,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
    animation:fadeOut 3s ease 6s forwards;
}

.intro h1{
    font-size:50px;
    text-align:center;
    animation:zoom 3s infinite alternate;
}

.intro p{
    margin-top:20px;
    font-size:22px;
    letter-spacing:3px;
}

.main{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:
    linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.8)),
    url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
    background-size:cover;
    background-position:center;
}

.main h2{
    font-size:45px;
    text-shadow:0 0 20px pink;
}

.main p{
    font-size:22px;
    margin-top:15px;
}

.heart{
    position:absolute;
    color:#ff4d88;
    font-size:25px;
    animation:float 5s linear infinite;
}

@keyframes zoom{
    from{
        transform:scale(1);
    }
    to{
        transform:scale(1.2);
    }
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<div class="intro">
    <h1>🌌 A Special Surprise Awaits...</h1>
    <p>For My Queen ❤️</p>
</div>


<div class="main">
    <h2>Happy Birthday My Queen 👑</h2>
    <p>Someone special made this just for you ❤️</p>
</div>


<script>

function createHeart(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"%";
    heart.style.animationDuration=(3+Math.random()*3)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
